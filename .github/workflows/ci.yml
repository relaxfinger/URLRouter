name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Validate route contracts on pull requests
        if: github.event_name == 'pull_request'
        run: |
          git show "${{ github.event.pull_request.base.sha }}:RouteContracts.json" > /tmp/RouteContracts.base.json
          swift Scripts/validate_route_contract.swift RouteContracts.json --baseline /tmp/RouteContracts.base.json
      - name: Validate route contracts on master
        if: github.event_name != 'pull_request'
        run: swift Scripts/validate_route_contract.swift RouteContracts.json
      - name: Check public API compatibility
        if: github.event_name == 'pull_request'
        run: >-
          swift package diagnose-api-breaking-changes
          "${{ github.event.pull_request.base.sha }}"
          --products URLRouter
          --products URLRouterPolicyProvider
      - name: Test URLRouter
        run: swift test
      - name: Build URLRouter for tvOS
        run: >-
          swift build
          --triple arm64-apple-tvos17.0-simulator
          --sdk "$(xcrun --sdk appletvsimulator --show-sdk-path)"
      - name: Build URLRouter for watchOS
        run: >-
          swift build
          --triple arm64-apple-watchos10.0-simulator
          --sdk "$(xcrun --sdk watchsimulator --show-sdk-path)"
      - name: Build URLRouterPolicyProvider
        run: swift build --target URLRouterPolicyProvider
      - name: Build URLRouterPolicyProvider for tvOS
        run: >-
          swift build --target URLRouterPolicyProvider
          --triple arm64-apple-tvos17.0-simulator
          --sdk "$(xcrun --sdk appletvsimulator --show-sdk-path)"
      - name: Build URLRouterPolicyProvider for watchOS
        run: >-
          swift build --target URLRouterPolicyProvider
          --triple arm64-apple-watchos10.0-simulator
          --sdk "$(xcrun --sdk watchsimulator --show-sdk-path)"
      - name: Build NavigationFeature
        run: swift build --package-path Features/NavigationFeature
      - name: Build NavigationFeature for tvOS
        run: >-
          swift build --package-path Features/NavigationFeature
          --triple arm64-apple-tvos17.0-simulator
          --sdk "$(xcrun --sdk appletvsimulator --show-sdk-path)"
      - name: Build NavigationFeature for watchOS
        run: >-
          swift build --package-path Features/NavigationFeature
          --triple arm64-apple-watchos10.0-simulator
          --sdk "$(xcrun --sdk watchsimulator --show-sdk-path)"
      - name: Build ContentFeature
        run: swift build --package-path Features/ContentFeature
      - name: Build ContentFeature for tvOS
        run: >-
          swift build --package-path Features/ContentFeature
          --triple arm64-apple-tvos17.0-simulator
          --sdk "$(xcrun --sdk appletvsimulator --show-sdk-path)"
      - name: Build ContentFeature for watchOS
        run: >-
          swift build --package-path Features/ContentFeature
          --triple arm64-apple-watchos10.0-simulator
          --sdk "$(xcrun --sdk watchsimulator --show-sdk-path)"
      - name: Build demo
        run: >-
          xcodebuild build
          -project URLRouter.xcodeproj
          -scheme URLRouterDemo
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
