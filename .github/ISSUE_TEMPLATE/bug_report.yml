name: Bug report
description: Report a reproducible problem in URLRouter.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Please remove secrets, private URLs, and personal data."
  - type: input
    id: version
    attributes:
      label: URLRouter version or commit
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Xcode and iOS version
      placeholder: "Xcode 16.x, iOS 17.x"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction steps
      placeholder: "1. Open ...\n2. Call openURL(...)\n3. Observe ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
